<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nasdaq Dashboard Stable</title>
<style>
body{margin:0;padding:24px;background:#0b1020;color:#e5e7eb;font-family:Arial}
.wrap{max-width:1450px;margin:auto}
.top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px}
.title{font-size:32px;font-weight:700}
.sub{color:#94a3b8;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:22px}
.card{background:#111827;border:1px solid #243041;border-radius:8px;padding:14px 16px;min-height:110px}
.label{font-size:12px;color:#7c8aa0;text-transform:uppercase;font-weight:600}
.val{font-size:28px;font-weight:700;margin-top:10px}
.delta{font-size:13px;margin-top:6px;color:#94a3b8}
.good{color:#22c55e}.mid{color:#f59e0b}.bad{color:#ef4444}
</style>
</head>
<body>
<div class="wrap">

<div class="top">
<div>
<div class="title">Nasdaq Dashboard Stable</div>
<div class="sub">Reliable GitHub JSON version</div>
</div>
<div class="sub">Updated: <span id="ts">-</span></div>
</div>

<div class="grid">

<div class="card">
<div class="label">EMA Stack</div>
<div id="ema" class="val">-</div>
</div>

<div class="card">
<div class="label">NDFD</div>
<div id="ndfd" class="val">-</div>
<div id="ndfd_d" class="delta">-</div>
</div>

<div class="card">
<div class="label">Net 52W H/L</div>
<div id="net" class="val">-</div>
<div id="net_d" class="delta">-</div>
</div>

<div class="card">
<div class="label">Up/Down Vol</div>
<div id="ud" class="val">-</div>
<div id="ud_d" class="delta">-</div>
</div>

<div class="card">
<div class="label">ATR x50SMA</div>
<div id="atr" class="val">-</div>
<div id="atr_d" class="delta">-</div>
</div>

</div>
</div>

<script>
function delta(curr,prev,d=2){
 let x=(curr-prev).toFixed(d);
 if(curr>prev) return "▲ +" + x;
 if(curr<prev) return "▼ " + x;
 return "→ 0.00";
}

fetch("breadth.json?" + Date.now())
.then(r=>r.json())
.then(d=>{

document.getElementById("ts").textContent=d.timestamp;

document.getElementById("ema").textContent=d.ema_stack;
document.getElementById("ndfd").textContent=d.ndfd;
document.getElementById("ndfd_d").textContent=delta(d.ndfd,d.ndfd_prev);

document.getElementById("net").textContent=d.net;
document.getElementById("net_d").textContent=delta(d.net,d.net_prev,0);

document.getElementById("ud").textContent=d.ud;
document.getElementById("ud_d").textContent=delta(d.ud,d.ud_prev);

document.getElementById("atr").textContent=d.atr;
document.getElementById("atr_d").textContent=delta(d.atr,d.atr_prev);

});
</script>
</body>
</html>
