<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nasdaq Live Dashboard</title>

<style>
body{
    margin:0;
    padding:24px;
    background:#0b1020;
    color:#e5e7eb;
    font-family:Arial, Helvetica, sans-serif;
}
.wrap{
    max-width:1450px;
    margin:auto;
}
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}
.title{
    font-size:32px;
    font-weight:700;
}
.sub{
    color:#94a3b8;
    font-size:14px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-top:22px;
}
.card{
    background:#111827;
    border:1px solid #243041;
    border-radius:8px;
    padding:14px 16px;
    min-height:118px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}
.label{
    font-size:12px;
    color:#7c8aa0;
    text-transform:uppercase;
    letter-spacing:.7px;
    font-weight:600;
}
.val{
    font-size:28px;
    font-weight:700;
}
.delta{
    font-size:13px;
    margin-top:6px;
}
.good{color:#22c55e;}
.mid{color:#f59e0b;}
.bad{color:#ef4444;}
.flat{color:#94a3b8;}
.footer{
    margin-top:20px;
    color:#94a3b8;
    font-size:12px;
}
</style>
</head>

<body>
<div class="wrap">

<div class="top">
<div>
<div class="title">Nasdaq Live Dashboard</div>
<div class="sub">Live data on page load (no GitHub Actions needed)</div>
</div>
<div class="sub">Updated: <span id="ts">Loading...</span></div>
</div>

<div class="grid">

<div class="card">
<div class="label">EMA STACK</div>
<div id="ema" class="val">...</div>
<div class="delta flat">QQQ vs 9EMA vs 21EMA</div>
</div>

<div class="card">
<div class="label">QQQ PRICE</div>
<div id="price" class="val">...</div>
<div id="chg" class="delta flat">...</div>
</div>

<div class="card">
<div class="label">9 EMA</div>
<div id="ema9" class="val">...</div>
<div class="delta flat">short trend</div>
</div>

<div class="card">
<div class="label">21 EMA</div>
<div id="ema21" class="val">...</div>
<div class="delta flat">swing trend</div>
</div>

<div class="card">
<div class="label">ATR x50SMA</div>
<div id="atr" class="val">...</div>
<div class="delta flat">extension</div>
</div>

</div>

<div class="footer">
Live source: Stooq daily QQQ data
</div>

</div>

<script>
function cls(el, c){
  document.getElementById(el).className = "val " + c;
}

function avg(arr){
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function ema(values, period){
  const k = 2 / (period + 1);
  let result = values[0];
  for(let i=1;i<values.length;i++){
    result = values[i] * k + result * (1-k);
  }
  return result;
}

async function loadData(){

  const url = "https://stooq.com/q/d/l/?s=qqq.us&i=d";

  const res = await fetch(url);
  const txt = await res.text();

  const rows = txt.trim().split("\n").slice(1);

  const closes = rows.map(r => parseFloat(r.split(",")[4])).filter(x => !isNaN(x));

  const last = closes[closes.length-1];
  const prev = closes[closes.length-2];

  const ema9 = ema(closes.slice(-80),9);
  const ema21 = ema(closes.slice(-120),21);

  const sma50 = avg(closes.slice(-50));

  let tr = [];
  for(let i=1;i<closes.length;i++){
    tr.push(Math.abs(closes[i]-closes[i-1]));
  }

  const atr14 = avg(tr.slice(-14));

  const atrMult = ((last - sma50)/atr14).toFixed(2);

  // EMA Stack
  let stack="Mixed ⚠️";
  let c="mid";

  if(last > ema9 && ema9 > ema21){
    stack="Bullish ✅";
    c="good";
  }else if(last < ema9 && ema9 < ema21){
    stack="Bearish ❌";
    c="bad";
  }

  document.getElementById("ema").textContent = stack;
  cls("ema", c);

  document.getElementById("price").textContent = last.toFixed(2);
  cls("price","good");

  let diff = last-prev;
  let pct = diff/prev*100;

  document.getElementById("chg").textContent =
    (diff>=0?"▲ ":"▼ ") +
    diff.toFixed(2) +
    " (" + pct.toFixed(2) + "%)";

  document.getElementById("chg").className =
    "delta " + (diff>=0?"good":"bad");

  document.getElementById("ema9").textContent = ema9.toFixed(2);
  cls("ema9","mid");

  document.getElementById("ema21").textContent = ema21.toFixed(2);
  cls("ema21","mid");

  document.getElementById("atr").textContent = atrMult;
  cls("atr", atrMult < 3 ? "good" : atrMult < 4.5 ? "mid" : "bad");

  document.getElementById("ts").textContent =
    new Date().toLocaleString();
}

loadData();
</script>

</body>
</html>
