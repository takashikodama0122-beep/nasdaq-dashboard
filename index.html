<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasdaq Dashboard</title>
<style>
body{font-family:Arial;background:#111;color:#eee;padding:30px}
table{border-collapse:collapse;width:100%;max-width:800px;background:#1b1b1b}
th,td{border:1px solid #333;padding:12px;text-align:left}
th{background:#222}
h1{margin-top:0}
.small{color:#aaa;font-size:12px}
</style>
</head>
<body>
<h1>Nasdaq Breadth Dashboard</h1>
<div class="small">Auto-updates from GitHub Actions</div>
<br>
<table>
<thead>
<tr><th>Metric</th><th>Value</th></tr>
</thead>
<tbody>
<tr><td>NDFD</td><td id="ndfd">Loading...</td></tr>
<tr><td>Net 52W High-Low</td><td id="net">Loading...</td></tr>
<tr><td>Up/Down Volume</td><td id="ud">Loading...</td></tr>
</tbody>
</table>

<script>
fetch('breadth.json?ts=' + Date.now())
.then(r => r.json())
.then(d => {
document.getElementById('ndfd').textContent = d.ndfd;
document.getElementById('net').textContent = d.net;
document.getElementById('ud').textContent = d.ud;
});
</script>
</body>
</html>
